# Pings Supabase on a schedule so free-tier projects stay active (avoid auto-pause).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — e.g. https://YOUR-PROJECT.supabase.co
#   SUPABASE_ANON_KEY  — anon public key from Supabase → Project Settings → API
#
# Local test (from project root):
#   source .env.local
#   export SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
#   export SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
#   curl -s "${SUPABASE_URL}/auth/v1/health" -H "apikey: ${SUPABASE_ANON_KEY}"

name: Supabase Keep Alive

on:
  schedule:
    # Daily at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secrets."
            exit 1
          fi

          # /rest/v1/ often returns 401 without a table path — use auth health instead.
          response=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}")

          status=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Supabase responded with HTTP ${status}"
          echo "Body: ${body}"

          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            echo "Keep-alive ping succeeded."
            exit 0
          fi

          echo "Unexpected response — check project is not paused and secrets match Supabase → API."
          exit 1
